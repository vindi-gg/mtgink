name: Update TCGPlayer Prices

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC
  workflow_dispatch:        # Manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Import TCGPlayer prices
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TCGPLAYER_PUBLIC_KEY: ${{ secrets.TCGPLAYER_PUBLIC_KEY }}
          TCGPLAYER_PRIVATE_KEY: ${{ secrets.TCGPLAYER_PRIVATE_KEY }}
        run: python3 scripts/import_tcgplayer_prices.py
